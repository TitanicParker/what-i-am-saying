<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>The Periodic Table of Completed Intelligibility</title>
<style>
html,body{margin:0;min-height:100%;background:#11130f;color:#e9e7df}
#loading{display:grid;min-height:100vh;place-items:center;font:500 14px/1.4 ui-sans-serif,system-ui,sans-serif;color:#aaa99f;letter-spacing:.04em}
</style>
</head>
<body>
<div id="loading">Loading the table…</div>
<noscript><p style="padding:2rem;font-family:system-ui,sans-serif"><a href="periodic_table_completed_intelligibility.html" style="color:inherit">Open the document</a></p></noscript>
<script>
(async function(){
  const response=await fetch('./periodic_table_completed_intelligibility.html');
  if(!response.ok) throw new Error('Could not load the document.');
  const source=await response.text();
  const parsed=new DOMParser().parseFromString(source,'text/html');
  document.title=parsed.title||document.title;
  parsed.querySelectorAll('style').forEach(function(style){document.head.appendChild(style.cloneNode(true));});
  const refinement=document.createElement('style');
  refinement.textContent=`
    body{font-size:18px;line-height:1.54}
    main{width:min(calc(100% - 36px),1180px);margin:0 auto;padding:36px 0 24px}
    header,.essay{width:min(100%,74ch);margin-left:auto;margin-right:auto}
    header{padding-bottom:12px;margin-bottom:14px}
    h1{font-size:clamp(1.55rem,3.1vw,2.35rem)}
    .essay{margin-bottom:24px;text-align:justify;hyphens:auto}
    .table-wrap{width:100%;margin:0 auto;border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.24)}
    table{min-width:1080px}
    thead th{position:sticky;top:0;z-index:3;padding:12px;background:#181b15}
    thead .corner{left:0;z-index:5}
    tbody th{position:sticky;left:0;z-index:2;padding:15px 12px;background:#171a14}
    tbody td{padding:14px 12px 15px}
    .cell-name{font-size:1.08rem;line-height:1.18;margin-bottom:6px}
    .landing{font-size:.81rem}
    footer{padding-top:10px}
    @media(max-width:760px){
      body{font-size:16px;line-height:1.5}
      main{width:min(calc(100% - 20px),1180px);padding:18px 0 14px}
      header,.essay{width:100%}
      header{margin-bottom:10px}
      .essay{text-align:left;margin-bottom:16px}
      .table-wrap{border-radius:10px}
      tbody th,tbody td{padding:12px 10px}
    }
    @media print{
      main,header,.essay,.table-wrap{width:auto;max-width:none}
      main{padding:0}
      thead th,thead .corner,tbody th{position:static}
      .essay{margin-bottom:4mm}
      .table-wrap{border-radius:0;box-shadow:none}
    }
  `;
  document.head.appendChild(refinement);
  const main=parsed.querySelector('main');
  if(!main) throw new Error('The document has no main content.');
  document.getElementById('loading').replaceWith(main);
})().catch(function(error){
  const loading=document.getElementById('loading');
  loading.innerHTML='<span>Unable to load the page. <a href="periodic_table_completed_intelligibility.html" style="color:inherit">Open the original document</a>.</span>';
  console.error(error);
});
</script>
</body>
</html>
